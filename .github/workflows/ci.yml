name: Ecosystem CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  discord-bot-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./discord-bot
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./discord-bot/package-lock.json
          
      - name: Install dependencies
        run: npm install
        
      - name: Run Unit & Integration Tests
        run: npm test

  familylegends-dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./familylegends
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./familylegends/package-lock.json
          
      - name: Install dependencies
        run: npm install
        
      - name: Check Linting & Formatting
        run: npm run lint --if-present
        
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        
      - name: Build Next.js Dashboard
        run: npm run build
        
      - name: Run E2E Tests
        run: npx playwright test
